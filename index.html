<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Abisheka! 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffeef8 0%, #fff0e6 50%, #e8f4ff 100%);
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  .bd-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .confetti-piece {
    position: fixed;
    border-radius: 2px;
    animation: fall linear infinite;
    opacity: 0.85;
    pointer-events: none;
  }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .balloons {
    display: flex;
    gap: 1rem;
    margin-bottom: 0.5rem;
    animation: floatUp 3s ease-in-out infinite;
  }

  @keyframes floatUp {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }

  .balloon {
    font-size: 2.8rem;
    animation: sway 2s ease-in-out infinite;
    display: inline-block;
  }
  .balloon:nth-child(2) { animation-delay: 0.3s; }
  .balloon:nth-child(3) { animation-delay: 0.6s; }
  .balloon:nth-child(4) { animation-delay: 0.9s; }

  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50%       { transform: rotate(5deg); }
  }

  .cake-emoji {
    font-size: 90px;
    animation: bounce 1.5s ease-in-out infinite;
    margin: 0.3rem 0;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-14px); }
  }

  .stars-row {
    font-size: 1.5rem;
    margin: 0.4rem 0;
    animation: sparkle 1.5s ease-in-out infinite;
  }

  @keyframes sparkle {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .name-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2rem, 7vw, 3rem);
    color: #d63fa8;
    text-shadow: 2px 3px 0 #ffb3e0, 4px 5px 0 rgba(214,63,168,0.2);
    margin: 0.5rem 0;
    line-height: 1.3;
  }

  .wish-text {
    font-size: 1.05rem;
    color: #7a4b8a;
    max-width: 340px;
    line-height: 1.8;
    margin: 0.8rem auto 1.2rem;
  }

  .wish-text2 {
    font-size: 1.4rem;
    color: #730753;
    max-width: 340px;
    line-height: 1.2;
    margin: 0.8rem auto 1.2rem;
  }

  .wish-text3 {
    font-size: 1.4rem;
    color: #10020b;
    max-width: 340px;
    line-height: 1.2;
    margin: 0.8rem auto 1.2rem;
  }


  .btn-pop {
    background: linear-gradient(135deg, #ff6ec4, #ff9a5c);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 0.75rem 2.2rem;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(255,110,196,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 0.5rem;
  }

  .btn-pop:hover  { transform: scale(1.06); box-shadow: 0 6px 22px rgba(255,110,196,0.55); }
  .btn-pop:active { transform: scale(0.97); }

  .secret-msg {
    display: none;
    font-size: 1rem;
    color: #c2185b;
    background: rgba(255,255,255,0.75);
    border-radius: 12px;
    padding: 1rem 1.4rem;
    margin-top: 1.1rem;
    max-width: 300px;
    border: 1.5px dashed #ff80c8;
    line-height: 1.7;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }

  .hb-tag {
    font-size: 0.85rem;
    color: #b06080;
    margin-top: 1.5rem;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>


<div class="bd-wrap">
  <div class="balloons">
    <span class="balloon">🎈</span>
     <span class="balloon">🎀</span>
    <span class="balloon">🎈</span>
  </div>

  <div class="cake-emoji">🎂</div>
  <div class="wish-text3">✨Turning 21<sup>st</sup>✨</div>

  <div class="name-text">Happy Birthday<br> Abisheka! 🎀</div>

  <p class="wish-text">
    I feel really lucky to know someone as kind, caring, and inspiring as you. I sincerely hope you achieve your dream of becoming an amazing doctor.  🌸
  </p>
  <h1 class="wish-text2">Wishing you the happiest birthday!🩷</h1>

  <button class="btn-pop" onclick="revealMsg()">🎁 Open your surprise!</button>

  <div class="secret-msg" id="secretMsg">
    Podiii loosu 😇💕
  </div>

  <p class="hb-tag">🎉 Made with love just for you 🎉</p>
</div>

<script>
  const colors = ['#ff6eb4','#ffb347','#87ceeb','#98fb98','#dda0dd','#ff9999','#ffd700'];

  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left   = Math.random() * 100 + 'vw';
    c.style.top    = (Math.random() * 100 - 20) + 'vh';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.width  = (6 + Math.random() * 8) + 'px';
    c.style.height = (6 + Math.random() * 8) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.animationDuration  = (2.5 + Math.random() * 3.5) + 's';
    c.style.animationDelay     = (Math.random() * 4) + 's';
    document.body.appendChild(c);
  }

  function revealMsg() {
    document.getElementById('secretMsg').style.display = 'block';
    document.querySelector('.btn-pop').style.display = 'none';
  }
</script>
</body>
</html>
